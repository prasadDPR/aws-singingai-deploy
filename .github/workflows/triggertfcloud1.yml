name: Deploy SingingAI Infrastructure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Terraform
    runs-on: ubuntu-latest

    steps:
      # ── CHECKOUT & SETUP ────────────────────────────────────────────────────

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.4
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Setup Terraform Cloud Credentials
        run: |
          echo "credentials \"app.terraform.io\" { token = \"${{ secrets.TF_API_TOKEN }}\" }" > ~/.terraformrc

      # ── TERRAFORM ───────────────────────────────────────────────────────────

      - name: Terraform Init
        run: terraform init -input=false -no-color
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Validate
        run: terraform validate -no-color
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -lock-timeout=60s
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_my_ip: ${{ secrets.TF_VAR_MY_IP }}
          TF_VAR_private_key_path: ${{ secrets.TF_VAR_PRIVATE_KEY_PATH }}
          TF_VAR_groq_api_key: ${{ secrets.TF_VAR_GROQ_API_KEY }}
          TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_session_secret: ${{ secrets.TF_VAR_SESSION_SECRET }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -lock-timeout=60s
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_my_ip: ${{ secrets.TF_VAR_MY_IP }}
          TF_VAR_private_key_path: ${{ secrets.TF_VAR_PRIVATE_KEY_PATH }}
          TF_VAR_groq_api_key: ${{ secrets.TF_VAR_GROQ_API_KEY }}
          TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.TF_VAR_GOOGLE_CLIENT_SECRET }}
          TF_VAR_session_secret: ${{ secrets.TF_VAR_SESSION_SECRET }}

      # ── DOCKER BUILD & PUSH ──────────────────────────────────────────────────

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-west-2 | \
          docker login --username AWS --password-stdin \
          220719767957.dkr.ecr.eu-west-2.amazonaws.com

      - name: Checkout SingingAI Application
        run: |
          git clone https://github.com/prasadDPR/singing-ai-deploy.git singing-ai-app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node.js Dependencies
        run: |
          cd singing-ai-app
          npm install --legacy-peer-deps

      - name: Build Node.js Docker Image
        run: |
          cd singing-ai-app
          docker build -t singingai-node .

      - name: Build Python Docker Image
        run: |
          cd singing-ai-app
          docker build -t singingai-python ./python-backend

      - name: Push Node.js Image to ECR
        run: |
          docker tag singingai-node:latest \
            220719767957.dkr.ecr.eu-west-2.amazonaws.com/singingai-node:latest
          docker push \
            220719767957.dkr.ecr.eu-west-2.amazonaws.com/singingai-node:latest

      - name: Push Python Image to ECR
        run: |
          docker tag singingai-python:latest \
            220719767957.dkr.ecr.eu-west-2.amazonaws.com/singingai-python:latest
          docker push \
            220719767957.dkr.ecr.eu-west-2.amazonaws.com/singingai-python:latest

      # ── ECS DEPLOYMENT ───────────────────────────────────────────────────────

      - name: Run Database Migrations
        run: |
          SUBNET=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=prod-private-app-subnet-2a" \
            --query 'Subnets[0].SubnetId' \
            --output text --region eu-west-2)

          SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=singingai-ecs-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text --region eu-west-2)

          echo "Running migrations in subnet: $SUBNET"
          echo "Using security group: $SG"

          aws ecs run-task \
            --cluster singingai-cluster \
            --task-definition singingai-node \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"singingai-node","command":["sh","-c","cd /app && node migrate.js && echo MIGRATION_DONE"]}]}' \
            --region eu-west-2

          echo "Waiting 120 seconds for migrations to complete..."
          sleep 120

      - name: Force ECS Service Redeployment
        run: |
          aws ecs update-service \
            --cluster singingai-cluster \
            --service singingai-node-service \
            --force-new-deployment \
            --region eu-west-2

          aws ecs update-service \
            --cluster singingai-cluster \
            --service singingai-python-service \
            --force-new-deployment \
            --region eu-west-2

          echo "✅ ECS services redeployment triggered"
          echo "🌐 Application will be live at https://singingai.prasadcloud.com"
